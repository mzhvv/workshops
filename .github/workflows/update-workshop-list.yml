name: update-workshop-list

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch repositories with topic mzhvv-workshop
        run: |
          curl -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/mzhvv/repos?per_page=100" > repos.json
          
          echo "# workshop" > README.md
          echo "hands-on growth 🎯" >> README.md
          echo "" >> README.md

          # 1
          echo "## workshop list:" >> README.md
          echo "*auto-update workshop list!*" >> README.md
          echo "| repositories | website |" >> README.md
          echo "|--------------|---------|" >> README.md
          jq -r '.[] 
            | select(
                (.owner.login == "mzhvv" and .topics != null) and
                (.topics | contains(["mzhvv-workshop"])) and
                .name != "workshop"
              )
            | "| [\(.name)](\(.html_url))     
            | \(.homepage // "???")
            |"' repos.json >> README.md

          # 2
          echo "## workshop list:" >> README.md
          echo "| Репозиторий | Описание | Язык | Обновлён | homepage |" >> README.md
          echo "|-------------|----------|------|----------| -------- |" >> README.md
          jq -r '.[] | select(.owner.login == "mzhvv" and .topics != null and (.topics | contains(["mzhvv-workshop"]))) | "| [\(.name)](\(.html_url)) | \(.description // "—") | \(.language // "—") | \(.updated_at[0:10]) | \(.homepage // "???") |"' repos.json >> README.md
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "auto-update workshop list"
          git push
