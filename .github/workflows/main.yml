name: Update Workshop Index

on:
  schedule:
    - cron: '0 0 * * *'  # Запускается каждый день в полночь
  workflow_dispatch:      # Позволяет запускать вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Чтобы Action мог обновить README
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch repositories with topic mzhvv-workshop
        run: |
          # Получаем список репозиториев через GitHub API
          curl -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/users/mzhvv/repos?per_page=100" > repos.json
          
          # Фильтруем те, у которых есть topic "mzhvv-workshop"
          echo "# 🛠️ Мой Workshop-индекс" > README.md
          echo "" >> README.md
          echo "Автоматически обновляемый список всех репозиториев с темой \`mzhvv-workshop\`." >> README.md
          echo "" >> README.md
          echo "| Репозиторий | Описание | Язык | Обновлён |" >> README.md
          echo "|-------------|----------|------|----------|" >> README.md
          
          jq -r '.[] | select(.topics != null and (.topics | contains(["mzhvv-workshop"]))) | "| [\(.name)](\(.html_url)) | \(.description // "—") | \(.language // "—") | \(.updated_at[0:10]) |"' repos.json >> README.md
          
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update workshop index"
          git push
